<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- App background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGradient)"/>
  
  <!-- Tennis/Padel Court Icon -->
  <rect x="128" y="180" width="256" height="152" rx="12" ry="12" fill="none" stroke="white" stroke-width="8"/>
  <line x1="256" y1="180" x2="256" y2="332" stroke="white" stroke-width="4"/>
  <line x1="128" y1="256" x2="384" y2="256" stroke="white" stroke-width="4"/>
  
  <!-- Tennis Net -->
  <rect x="250" y="185" width="12" height="142" fill="white" opacity="0.8"/>
  <rect x="252" y="190" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="200" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="210" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="220" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="240" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="250" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="260" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="270" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="280" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="290" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="300" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="310" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  <rect x="252" y="320" width="8" height="5" fill="transparent" stroke="white" stroke-width="1"/>
  
  <!-- App Title -->
  <text x="256" y="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">Paris</text>
  <text x="256" y="160" text-anchor="middle" fill="url(#logoGradient)" font-family="Arial, sans-serif" font-size="36" font-weight="bold">League</text>
  
  <!-- Bottom accent -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="normal" opacity="0.8">Gestione Campi</text>
  
  <!-- Corner decoration -->
  <circle cx="80" cy="80" r="16" fill="white" opacity="0.2"/>
  <circle cx="432" cy="432" r="16" fill="white" opacity="0.2"/>
  <circle cx="432" cy="80" r="12" fill="white" opacity="0.15"/>
  <circle cx="80" cy="432" r="12" fill="white" opacity="0.15"/>
</svg>
